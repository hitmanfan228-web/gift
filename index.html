<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компліменти для тебе 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700&display=swap');

        :root {
            --pink-deep: #e8537a;
            --pink-mid: #f48fb1;
            --pink-soft: #ffd6e8;
            --cream: #fff5f7;
            --plum: #5c3346;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(160deg, #fff0f4 0%, #ffe0eb 45%, #ffd0e3 100%);
        }

        /* floating ambient hearts */
        #hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .float-heart {
            position: absolute;
            bottom: -40px;
            opacity: 0;
            color: var(--pink-mid);
            animation: rise linear forwards;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
                opacity: 0;
            }

            10% {
                opacity: .55;
            }

            85% {
                opacity: .4;
            }

            100% {
                transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(25deg) scale(1.1);
                opacity: 0;
            }
        }

        .stage {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .eyebrow {
            font-size: 13px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--pink-deep);
            font-weight: 700;
            margin-bottom: 14px;
            opacity: .8;
        }

        .card {
            position: relative;
            width: min(560px, 92vw);
            min-height: 230px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            padding: 46px 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 18px 40px -12px rgba(232, 83, 122, 0.28),
                0 2px 0 rgba(255, 255, 255, 0.6) inset;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--pink-mid), transparent 40%, transparent 60%, var(--pink-deep));
            z-index: -1;
            opacity: .35;
        }

        #compliment {
            font-family: 'Caveat', cursive;
            font-size: clamp(28px, 5.2vw, 42px);
            color: var(--plum);
            line-height: 1.35;
            font-weight: 700;
            transition: opacity .25s ease, transform .25s ease;
        }

        #compliment.swap {
            opacity: 0;
            transform: translateY(8px) scale(.98);
        }

        .corner-heart {
            position: absolute;
            font-size: 20px;
            opacity: .5;
        }

        .corner-heart.tl {
            top: 14px;
            left: 18px;
        }

        .corner-heart.br {
            bottom: 14px;
            right: 18px;
            transform: rotate(180deg);
        }

        button#newBtn {
            margin-top: 34px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            background: linear-gradient(135deg, var(--pink-deep), #f06292);
            border: none;
            padding: 15px 36px;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: .02em;
            box-shadow: 0 10px 24px -6px rgba(232, 83, 122, 0.55);
            transition: transform .15s ease, box-shadow .15s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        button#newBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -6px rgba(232, 83, 122, 0.65);
        }

        button#newBtn:active {
            transform: translateY(0) scale(.97);
        }

        button#newBtn:focus-visible {
            outline: 3px solid var(--pink-deep);
            outline-offset: 3px;
        }

        .btn-heart {
            display: inline-block;
            animation: beat 1.1s ease-in-out infinite;
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.22);
            }
        }

        /* burst hearts on click */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            font-size: 18px;
            color: var(--pink-deep);
            z-index: 5;
            animation: burst .9s ease-out forwards;
        }

        @keyframes burst {
            0% {
                transform: translate(0, 0) scale(.6);
                opacity: 1;
            }

            100% {
                transform: translate(var(--bx), var(--by)) scale(1.1);
                opacity: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .float-heart,
            .burst-heart {
                animation: none !important;
                display: none;
            }

            .btn-heart {
                animation: none;
            }

            #compliment {
                transition: none;
            }
        }
    </style>
</head>

<body>

    <div id="hearts"></div>

    <!-- hidden SoundCloud player -->
    <iframe id="scFrame" width="1" height="1" scrolling="no" frameborder="no" allow="autoplay"
        style="position:absolute; left:-9999px; top:-9999px;"></iframe>
    <script src="https://w.soundcloud.com/player/api.js"></script>

    <div class="stage">
        <div class="eyebrow">рижуля</div>

        <div class="card">
            <span class="corner-heart tl">💗</span>
            <span class="corner-heart br">💗</span>
            <p id="compliment">нажимай кпопку любімка</p>
        </div>

        <button id="newBtn"><span class="btn-heart">💖</span> нажимай любімка </button>
    </div>

    <script>
        // ====== PASTE YOUR SOUNDCLOUD TRACK LINK HERE ======
        const SC_TRACK_URL = "https://soundcloud.com/kirill-matukevich/ryzhaya-davalka-kashhenko";
        const MUSIC_VOLUME = 35; // 0-100, lower = quieter
        // =====================================================

        const compliments = [
            "хвате кидати стікери і ше якусь хуйню іди до мене",
            "у мене в кімнаті пизда як темно не хватає тіки тебе",
            "помниш я казав мені страшно спати самому? поможеш?",
            "ти ваще ахуела? перестань забивати мої фантазії",
            "ти канечно не котік шучу ше той <3",
        ];

        const complimentEl = document.getElementById('compliment');
        const btn = document.getElementById('newBtn');
        let lastIndex = -1;

        function pickCompliment() {
            let idx;
            do {
                idx = Math.floor(Math.random() * compliments.length);
            } while (idx === lastIndex && compliments.length > 1);
            lastIndex = idx;
            return compliments[idx];
        }

        function showNext() {
            complimentEl.classList.add('swap');
            setTimeout(() => {
                complimentEl.textContent = pickCompliment();
                complimentEl.classList.remove('swap');
            }, 220);
        }

        function burstHearts(x, y) {
            const symbols = ['💕', '💗', '💖', '💓'];
            for (let i = 0; i < 8; i++) {
                const h = document.createElement('span');
                h.className = 'burst-heart';
                h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
                const dist = 60 + Math.random() * 50;
                h.style.left = x + 'px';
                h.style.top = y + 'px';
                h.style.setProperty('--bx', (Math.cos(angle) * dist) + 'px');
                h.style.setProperty('--by', (Math.sin(angle) * dist - 30) + 'px');
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 950);
            }
        }

        btn.addEventListener('click', (e) => {
            showNext();
            burstHearts(e.clientX, e.clientY);
            startMusic();
        });

        // ambient floating hearts in background
        const heartsLayer = document.getElementById('hearts');
        const ambientSymbols = ['💗', '💕', '♡', '💓'];
        function spawnAmbient() {
            const h = document.createElement('span');
            h.className = 'float-heart';
            h.textContent = ambientSymbols[Math.floor(Math.random() * ambientSymbols.length)];
            const size = 14 + Math.random() * 22;
            h.style.fontSize = size + 'px';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
            const duration = 8 + Math.random() * 7;
            h.style.animationDuration = duration + 's';
            heartsLayer.appendChild(h);
            setTimeout(() => h.remove(), duration * 1000 + 200);
        }
        setInterval(spawnAmbient, 900);
        for (let i = 0; i < 5; i++) setTimeout(spawnAmbient, i * 300);

        // ====== music (SoundCloud widget — starts when the button is clicked) ======
        let scWidget = null;
        let musicStarted = false;

        function startMusic() {
            // load the iframe ONLY on first click, with auto_play baked into
            // the URL — this keeps the iframe's own load (and its autoplay)
            // inside the same user-gesture window as the tap, which mobile
            // Safari/Chrome require for audio to actually play
            if (musicStarted) return;
            musicStarted = true;
            const frame = document.getElementById('scFrame');
            frame.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(SC_TRACK_URL)}&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_artwork=false&visual=false&buying=false&sharing=false&download=false`;
            frame.addEventListener('load', () => {
                scWidget = SC.Widget(frame);
                scWidget.bind(SC.Widget.Events.READY, () => {
                    scWidget.setVolume(MUSIC_VOLUME);
                });
            });
        }
    </script>

</body>

</html>
